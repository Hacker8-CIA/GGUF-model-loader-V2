<!DOCTYPE html>
<html lang="en" data-theme="phosphor">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GGUF Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"><span class="dot" id="brand-dot"></span></div>
      <h1>GGUF<span>Chat</span></h1>
    </div>

    <canvas id="wave-canvas" height="34"></canvas>

    <div class="topbar-actions">
      <div class="status-pill" id="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">No model loaded</span>
      </div>
      <button id="btn-theme" class="icon-btn" title="Change theme">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2a10 10 0 1 0 0 20 2.5 2.5 0 0 0 1.77-4.27 1.5 1.5 0 0 1 1.06-2.56H17a5 5 0 0 0 5-5c0-4.42-4.48-8-10-8Zm-5.5 9a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm3-4a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm3 4a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Z"/></svg>
      </button>
      <button id="btn-pick-model" class="btn btn-primary">Load .gguf model</button>
    </div>
  </header>

  <main class="main">
    <section id="chat-log" class="chat-log">
      <div class="empty-state" id="empty-state">
        <div class="empty-glyph">◈</div>
        <h3>Load a .gguf model to begin</h3>
        <p>Click "Load .gguf model" above, pick any GGUF file on your computer, and start chatting — fully offline.</p>
      </div>
    </section>

    <form id="chat-form" class="input-bar">
      <button type="button" id="btn-mic" class="mic-btn" title="Voice input">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2Z"/></svg>
      </button>
      <textarea id="chat-input" rows="1" placeholder="Load a model to start chatting..." disabled></textarea>
      <button type="submit" id="btn-send" class="send-btn" disabled>
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 20V4l19 8-19 8Zm2-3 11.85-5L5 7v3.5l7 1.5-7 1.5V17Z"/></svg>
      </button>
      <button type="button" id="btn-stop" class="stop-btn" style="display:none">Stop</button>
    </form>
  </main>
</div>

<div id="toast" class="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
